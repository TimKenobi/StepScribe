<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #eab308; }
    #status {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
      text-align: center;
      padding: 0 20px;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid #334155;
      border-top: 2px solid #eab308;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="icon">🔥</div>
  <h1>StepScribe</h1>
  <p style="font-size: 11px; color: #64748b;">Recovery Journaling Companion</p>
  <div class="spinner"></div>
  <p id="status">Starting services...</p>
</body>
</html>
