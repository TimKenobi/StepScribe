services:
  db:
    image: postgres:17-alpine
    container_name: stepscribe-db
    environment:
      POSTGRES_USER: stepscribe
      POSTGRES_PASSWORD: stepscribe
      POSTGRES_DB: stepscribe
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - stepscribe-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stepscribe-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      # Persistent data for uploads and exports
      - ./data/exports:/app/data/exports
      - ./data/uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # If using Ollama on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8100}
        - NEXT_PUBLIC_APP_NAME=StepScribe
    container_name: stepscribe-frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # Optional: Run Ollama locally inside Docker
  # Start with: docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: stepscribe-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 4G

volumes:
  stepscribe-pgdata:
    driver: local
  ollama-data:
    driver: local
