version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stepscribe-backend
    env_file: .env
    ports:
      - "${BACKEND_PORT:-8100}:8000"
    volumes:
      # Persistent data — mapped to local folders so nothing is lost
      - ./data/db:/app/data
      - ./data/exports:/app/data/exports
      - ./data/uploads:/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # If using Ollama on the host machine
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8100}
        - NEXT_PUBLIC_APP_NAME=StepScribe
    container_name: stepscribe-frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-3100}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stepscribe-data:
    driver: local
